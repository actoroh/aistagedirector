<div id="app-root"></div>
<style>
  :root{
    --bg-base:#0A0D12; --bg-panel:#12161F; --bg-panel-2:#1A2029; --bg-panel-3:#20273240;
    --line:#232B38; --line-soft:#1C2330;
    --text-1:#E6EAF0; --text-2:#8993A4; --text-3:#5C6577;
    --safe:#34D8B0; --safe-dim:#1B6B57;
    --alert:#FF4D5E; --alert-dim:#7A2530;
    --standby:#F2B84B; --standby-dim:#7A5C22;
    --font-display: "Pretendard","Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",sans-serif;
    --font-mono: "JetBrains Mono", ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
  }
  *{ box-sizing:border-box; }
  #app-root{
    font-family:var(--font-display); background:var(--bg-base); color:var(--text-1);
    min-height:100vh; padding:20px;
    background-image:
      radial-gradient(circle at 15% 10%, rgba(52,216,176,0.05), transparent 40%),
      radial-gradient(circle at 85% 90%, rgba(255,77,94,0.04), transparent 40%);
  }
  .wrap{ max-width:1480px; margin:0 auto; }

  .topbar{
    display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px;
    padding:14px 20px; margin-bottom:14px;
    background:var(--bg-panel); border:1px solid var(--line); border-radius:10px;
  }
  .brand{ display:flex; align-items:center; gap:12px; }
  .brand-mark{
    width:38px; height:38px; border-radius:9px; flex-shrink:0;
    background:linear-gradient(135deg, var(--safe), #1c8c74);
    display:flex; align-items:center; justify-content:center;
    font-family:var(--font-mono); font-weight:700; color:#04231c; font-size:14px;
  }
  .brand h1{ font-size:16px; margin:0; font-weight:700; }
  .brand p{ font-size:12px; margin:2px 0 0; color:var(--text-2); }

  .save-indicator{ font-family:var(--font-mono); font-size:11px; color:var(--text-3); display:flex; align-items:center; gap:6px; }
  .save-indicator.saved{ color:var(--safe); }
  .save-indicator.error{ color:var(--alert); }
  .save-dot{ width:6px; height:6px; border-radius:50%; background:currentColor; }

  .tabbar{ display:flex; gap:6px; padding:5px; background:var(--bg-panel-2); border:1px solid var(--line); border-radius:9px; }
  .tab-btn{
    font-family:var(--font-display); font-size:12.5px; font-weight:600; padding:8px 16px; border-radius:6px;
    border:none; background:transparent; color:var(--text-2); cursor:pointer;
  }
  .tab-btn.active{ background:var(--safe); color:#04231c; }

  .status-pill{
    display:flex; align-items:center; gap:8px; font-family:var(--font-mono); font-size:12px;
    padding:8px 14px; border-radius:100px; border:1px solid var(--line);
    background:var(--bg-panel-2); color:var(--safe); transition:all .25s ease;
  }
  .status-pill.alert{ color:var(--alert); border-color:var(--alert-dim); background:#2A1418; }
  .status-dot{ width:8px; height:8px; border-radius:50%; background:currentColor; box-shadow:0 0 8px currentColor; }
  .status-pill.alert .status-dot{ animation:blink .9s infinite; }
  @keyframes blink{ 50%{ opacity:.25; } }

  .btn{
    font-family:var(--font-display); font-size:12.5px; font-weight:600;
    padding:9px 14px; border-radius:7px; border:1px solid var(--line);
    background:var(--bg-panel-2); color:var(--text-1); cursor:pointer;
    display:flex; align-items:center; gap:6px; transition:all .15s ease;
  }
  .btn:hover{ background:#242C3A; border-color:#34404F; }
  .btn.primary{ background:var(--safe); color:#04231c; border-color:var(--safe); }
  .btn.primary:hover{ filter:brightness(1.08); }
  .btn.danger{ background:transparent; color:var(--alert); border-color:var(--alert-dim); }
  .btn.danger:hover{ background:#2A1418; }
  .btn:disabled{ opacity:.4; cursor:not-allowed; }
  .controls{ display:flex; gap:8px; flex-wrap:wrap; }
  #file-import{ display:none; }

  .show-row{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:14px; }
  .show-select{
    background:var(--bg-panel-2); border:1px solid var(--line); border-radius:7px; color:var(--text-1);
    padding:9px 12px; font-size:12.5px; font-family:var(--font-display); min-width:180px;
  }

  .banner{ display:none; align-items:center; gap:10px; padding:11px 16px; margin-bottom:16px; border-radius:9px; background:#1a2230; border:1px solid var(--line); font-size:12.5px; color:var(--text-2); }
  .banner.show{ display:flex; }
  .banner.warn{ background:#2A2418; border-color:var(--standby-dim); color:#FBE3A8; }
  .banner.err{ background:#2A1418; border-color:var(--alert-dim); color:#FFD3D7; }

  .alertbar{ display:none; align-items:center; justify-content:space-between; gap:14px; padding:12px 18px; margin-bottom:16px; border-radius:10px; background:linear-gradient(90deg,#2A1418,#1a0f12); border:1px solid var(--alert-dim); animation:pulseBorder 1.4s infinite; }
  .alertbar.show{ display:flex; }
  @keyframes pulseBorder{ 50%{ border-color:var(--alert); } }
  .alertbar-text{ display:flex; align-items:center; gap:10px; font-size:13.5px; color:#FFD3D7; }
  .alertbar-text b{ color:var(--alert); }

  .panel{ background:var(--bg-panel); border:1px solid var(--line); border-radius:10px; padding:16px; display:flex; flex-direction:column; }
  .panel + .panel{ margin-top:16px; }
  .panel-title{ font-size:11.5px; letter-spacing:.6px; text-transform:uppercase; color:var(--text-2); font-weight:700; margin:0 0 12px; display:flex; align-items:center; justify-content:space-between; }
  .panel-title .count{ font-family:var(--font-mono); color:var(--text-3); text-transform:none; letter-spacing:0; }
  .badge{ font-family:var(--font-mono); font-size:10.5px; padding:3px 9px; border-radius:100px; color:var(--text-2); background:var(--bg-panel-3); }
  .badge.on{ color:var(--safe); }
  .badge.spike{ color:var(--alert); }

  /* ---- management view ---- */
  .cue-card{ background:var(--bg-panel-2); border:1px solid var(--line); border-radius:9px; padding:14px; margin-bottom:10px; }
  .cue-card-grid{ display:grid; grid-template-columns:60px 1fr 1fr 140px 1fr auto; gap:10px; align-items:start; }
  @media (max-width:1200px){ .cue-card-grid{ grid-template-columns:1fr 1fr; } }
  .cue-action-row{ margin-top:12px; padding-top:12px; border-top:1px solid var(--line); display:flex; gap:10px; align-items:flex-end; flex-wrap:wrap; }
  .cue-action-field{ min-width:110px; }
  .cue-action-field.grow{ flex:1; min-width:160px; }
  .action-status{ font-family:var(--font-mono); font-size:10.5px; padding:4px 8px; border-radius:5px; background:var(--bg-panel-3); color:var(--text-3); white-space:nowrap; }
  .field-label{ font-size:10px; color:var(--text-3); margin-bottom:4px; display:block; text-transform:uppercase; letter-spacing:.4px; }
  .field-input, .field-select, .field-textarea{ width:100%; background:var(--bg-panel-3); border:1px solid var(--line); border-radius:6px; color:var(--text-1); padding:7px 9px; font-size:12.5px; font-family:var(--font-display); }
  .field-input.mono{ font-family:var(--font-mono); }
  .field-textarea{ resize:vertical; min-height:38px; font-family:var(--font-display); }
  .kw-input-wrap{ display:flex; flex-wrap:wrap; gap:5px; background:var(--bg-panel-3); border:1px solid var(--line); border-radius:6px; padding:6px; min-height:36px; }
  .kw-chip{ font-family:var(--font-mono); font-size:10.5px; padding:3px 6px; border-radius:100px; background:var(--bg-panel-2); border:1px solid var(--safe-dim); color:var(--safe); display:flex; align-items:center; gap:5px; }
  .kw-chip.danger{ color:var(--alert); border-color:var(--alert-dim); }
  .kw-chip .x{ cursor:pointer; opacity:.6; }
  .kw-chip .x:hover{ opacity:1; }
  .kw-chip.flash{ animation:flash .6s ease; }
  @keyframes flash{ 0%{ box-shadow:0 0 0 0 currentColor; } 50%{ box-shadow:0 0 0 4px currentColor; } 100%{ box-shadow:0 0 0 0 transparent; } }
  .kw-input-wrap input{ flex:1; min-width:60px; background:transparent; border:none; color:var(--text-1); font-size:12px; outline:none; }
  .row-actions{ display:flex; flex-direction:column; gap:6px; align-items:flex-end; }
  .icon-btn{ width:28px; height:28px; border-radius:6px; border:1px solid var(--line); background:var(--bg-panel-3); color:var(--text-2); display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:13px; }
  .icon-btn:hover{ background:#242C3A; color:var(--text-1); }
  .icon-btn.del:hover{ background:#2A1418; color:var(--alert); border-color:var(--alert-dim); }
  .add-cue-btn{ width:100%; padding:13px; border-radius:9px; border:1.5px dashed var(--line); background:transparent; color:var(--text-2); font-size:13px; font-weight:600; cursor:pointer; margin-top:8px; }
  .add-cue-btn:hover{ border-color:var(--safe-dim); color:var(--safe); }
  .empty-state{ text-align:center; padding:40px 20px; color:var(--text-3); font-size:13px; }

  /* ---- dashboard view ---- */
  .grid{ display:grid; grid-template-columns:290px 1fr 320px; gap:16px; }
  @media (max-width:1200px){ .grid{ grid-template-columns:1fr; } }
  .cue-list{ display:flex; flex-direction:column; gap:6px; overflow-y:auto; max-height:560px; }
  .cue{ padding:10px 12px; border-radius:8px; border:1px solid transparent; background:var(--bg-panel-2); position:relative; overflow:hidden; }
  .cue.current{ border-color:var(--safe-dim); background:#122824; }
  .cue.current::before{ content:""; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--safe); }
  .cue.anomaly{ border-color:var(--alert-dim); background:#2a1418; }
  .cue.anomaly::before{ background:var(--alert); }
  .cue.done{ opacity:.4; }
  .cue-top{ display:flex; align-items:center; justify-content:space-between; margin-bottom:4px;}
  .cue-num{ font-family:var(--font-mono); font-size:11px; color:var(--text-3); }
  .cue-badge{ font-family:var(--font-mono); font-size:10px; padding:2px 6px; border-radius:4px; color:var(--text-2); background:var(--bg-panel-3);}
  .cue.current .cue-badge{ color:var(--safe); }
  .cue.anomaly .cue-badge{ color:var(--alert); }
  .cue-scene{ font-size:13px; font-weight:600; margin-bottom:2px; }
  .cue-action{ font-size:11.5px; color:var(--text-2); line-height:1.4; }
  .cue-timeout{ margin-top:6px; height:4px; border-radius:3px; background:var(--bg-panel-3); overflow:hidden; }
  .cue-timeout i{ display:block; height:100%; background:var(--safe); width:100%; transition:width 1s linear, background .3s ease; }

  .map-wrap{ display:flex; flex-direction:column; align-items:center; }
  .map-caption{ font-size:11.5px; color:var(--text-3); margin-top:10px; text-align:center; }
  .cam-node circle.ring{ fill:none; stroke:var(--safe); stroke-width:1.4; opacity:0; }
  .cam-node.scanning circle.ring{ animation:ringPulse 1.8s ease-out infinite; }
  .cam-node.alert-zone circle.ring{ stroke:var(--alert); animation:ringPulseAlert 1s ease-out infinite; opacity:1;}
  @keyframes ringPulse{ 0%{ r:9; opacity:.7; } 100%{ r:22; opacity:0; } }
  @keyframes ringPulseAlert{ 0%{ r:9; opacity:.9; } 100%{ r:30; opacity:0; } }
  .cam-node .core{ fill:var(--text-3); transition:fill .3s ease; }
  .cam-node.scanning .core{ fill:var(--safe); }
  .cam-node.alert-zone .core{ fill:var(--alert); }
  .zone-label{ fill:var(--text-2); font-family:var(--font-display); font-size:12px; }
  .zone-rect{ fill:none; stroke:var(--line); stroke-width:1.4; }

  .live-video-row{ display:flex; gap:14px; align-items:flex-start; margin-bottom:16px; }
  .video-thumb{ position:relative; width:150px; height:112px; border-radius:8px; overflow:hidden; background:#000; flex-shrink:0; }
  .video-thumb video{ width:100%; height:100%; object-fit:cover; transform:scaleX(-1); display:block; }
  .video-thumb .overlay{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:var(--text-3); font-size:10.5px; background:rgba(10,13,18,0.7); text-align:center; padding:8px; }
  .video-thumb.live .overlay{ display:none; }
  .video-thumb .ring{ position:absolute; inset:0; border:3px solid transparent; border-radius:8px; pointer-events:none; transition:border-color .2s ease; }
  .video-thumb.motion .ring{ border-color:var(--safe); }
  .video-thumb.spike .ring{ border-color:var(--alert); box-shadow:inset 0 0 20px rgba(255,77,94,0.35); }
  .meter-mini{ flex:1; }
  .meter-row{ display:flex; align-items:center; gap:10px; margin-top:8px; }
  .meter{ flex:1; height:7px; border-radius:5px; background:var(--bg-panel-2); overflow:hidden; border:1px solid var(--line); }
  .meter i{ display:block; height:100%; width:0%; background:linear-gradient(90deg, var(--safe), var(--standby), var(--alert)); transition:width .1s linear; }
  .meter-val{ font-family:var(--font-mono); font-size:11px; color:var(--text-2); width:32px; text-align:right; }
  .spark{ width:100%; height:36px; margin-top:6px; }
  .slider-row{ display:flex; align-items:center; gap:8px; margin-top:8px; font-size:10.5px; color:var(--text-2); }
  .slider-row input[type=range]{ flex:1; accent-color:var(--safe); }

  .flow-row{ display:flex; align-items:center; gap:0; margin-top:6px; width:100%; }
  .flow-node{ flex:1; text-align:center; padding:10px 6px; border-radius:8px; border:1px solid var(--line); background:var(--bg-panel-2); font-size:11px; color:var(--text-2); position:relative; z-index:1; }
  .flow-node .flabel{ display:block; font-size:10.5px; color:var(--text-3); margin-bottom:3px; }
  .flow-node.active{ border-color:var(--safe-dim); color:var(--safe); background:#122824; }
  .flow-node.active-alert{ border-color:var(--alert-dim); color:var(--alert); background:#2a1418; }
  .flow-arrow{ width:26px; height:2px; background:var(--line); position:relative; flex-shrink:0; }
  .flow-arrow.active{ background:var(--safe); }
  .flow-arrow.active-alert{ background:var(--alert); }
  .flow-arrow::after{ content:""; position:absolute; right:-3px; top:-3px; width:0; height:0; border-top:4px solid transparent; border-bottom:4px solid transparent; border-left:6px solid var(--line); }
  .flow-arrow.active::after{ border-left-color:var(--safe); }
  .flow-arrow.active-alert::after{ border-left-color:var(--alert); }

  .transcript-box{ min-height:70px; max-height:110px; overflow-y:auto; background:var(--bg-panel-2); border:1px solid var(--line); border-radius:8px; padding:10px; font-size:12.5px; line-height:1.6; color:var(--text-1); margin-bottom:10px;}
  .transcript-box .interim{ color:var(--text-3); font-style:italic; }
  .kw-chips{ display:flex; flex-wrap:wrap; gap:6px; margin-bottom:6px; }
  .kw-chip-static{ font-family:var(--font-mono); font-size:10.5px; padding:3px 7px; border-radius:100px; background:var(--bg-panel-2); border:1px solid var(--line); color:var(--text-2); }
  .kw-chip-static.cue{ color:var(--safe); border-color:var(--safe-dim); }
  .kw-chip-static.danger{ color:var(--alert); border-color:var(--alert-dim); }
  .kw-chip-static.flash{ animation:flash .6s ease; }

  .audio-track{ background:var(--bg-panel-2); border:1px solid var(--line); border-radius:8px; padding:10px 12px; margin-bottom:8px; }
  .audio-track-top{ display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; gap:8px; }
  .audio-track-name{ font-size:12px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; }
  .audio-track-time{ font-family:var(--font-mono); font-size:10.5px; color:var(--text-3); flex-shrink:0; }
  .audio-progress{ height:5px; border-radius:3px; background:var(--bg-panel-3); overflow:hidden; margin-bottom:8px; cursor:pointer; }
  .audio-progress i{ display:block; height:100%; background:var(--safe); width:0%; }
  .audio-track-controls{ display:flex; align-items:center; gap:8px; }
  .audio-mini-btn{ width:26px; height:26px; border-radius:6px; border:1px solid var(--line); background:var(--bg-panel-3); color:var(--text-1); display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:11px; flex-shrink:0; }
  .audio-mini-btn:hover{ background:#242C3A; }
  .audio-mini-btn.stop:hover{ background:#2A1418; color:var(--alert); }
  .audio-vol-slider{ flex:1; accent-color:var(--safe); }
  .audio-empty{ font-size:11.5px; color:var(--text-3); text-align:center; padding:14px; }
  .stop-all-btn{ background:transparent; color:var(--alert); border-color:var(--alert-dim); }
  .stop-all-btn:hover{ background:#2A1418; }

  .judge-card{ border-radius:9px; padding:14px; border:1px solid var(--line); background:var(--bg-panel-2); margin-bottom:12px; transition:all .3s ease; }
  .judge-card.normal{ border-color:var(--safe-dim); }
  .judge-card.anomaly{ border-color:var(--alert-dim); background:#2a1418; }
  .judge-label{ font-size:11px; color:var(--text-2); margin-bottom:6px; }
  .judge-result{ font-size:17px; font-weight:800; }
  .judge-card.normal .judge-result{ color:var(--safe); }
  .judge-card.anomaly .judge-result{ color:var(--alert); }
  .judge-sub{ font-size:11.5px; color:var(--text-2); margin-top:4px; }

  .ctrl-list{ display:flex; flex-direction:column; gap:8px; }
  .ctrl-row{ display:flex; align-items:center; justify-content:space-between; padding:9px 11px; border-radius:7px; background:var(--bg-panel-2); border:1px solid var(--line); }
  .ctrl-name{ font-size:12.5px; }
  .ctrl-state{ font-family:var(--font-mono); font-size:10.5px; padding:3px 8px; border-radius:5px; color:var(--text-2); background:var(--bg-panel-3); }
  .ctrl-state.exec{ color:var(--safe); background:#122824; }
  .ctrl-state.stop{ color:var(--alert); background:#2a1418; }

  .scn-row{ display:flex; align-items:center; justify-content:space-between; padding:7px 0; border-bottom:1px solid var(--line-soft); font-size:12px; gap:8px; }
  .scn-row:last-child{ border-bottom:none; }
  .scn-name{ display:flex; flex-direction:column; }
  .scn-src{ font-size:9.5px; color:var(--text-3); }
  .scn-tag{ font-family:var(--font-mono); font-size:10px; padding:2px 7px; border-radius:4px; color:var(--text-2); background:var(--bg-panel-3); white-space:nowrap; }
  .scn-tag.hit{ color:var(--alert); background:#2a1418; }
  .scn-test-btn{ font-size:10px; padding:3px 7px; border-radius:5px; border:1px solid var(--line); background:transparent; color:var(--text-2); cursor:pointer; }
  .scn-test-btn:hover{ background:#242C3A; }

  .log{ font-family:var(--font-mono); font-size:11.5px; display:flex; flex-direction:column-reverse; gap:6px; max-height:200px; overflow-y:auto; }
  .log-row{ display:flex; gap:10px; padding:6px 8px; border-radius:6px; background:var(--bg-panel-2); }
  .log-row .t{ color:var(--text-3); flex-shrink:0; }
  .log-row.ok .msg{ color:var(--safe); }
  .log-row.bad .msg{ color:var(--alert); }
  .log-row.info .msg{ color:var(--text-2); }

  .footnote{ font-size:11px; color:var(--text-3); text-align:center; margin-top:18px; line-height:1.8; }
  .footnote b{ color:var(--text-2); }
  ::-webkit-scrollbar{ width:6px; }
  ::-webkit-scrollbar-thumb{ background:#2A3240; border-radius:3px; }

  .modal-overlay{ position:fixed; inset:0; background:rgba(5,7,10,0.7); display:none; align-items:center; justify-content:center; z-index:50; }
  .modal-overlay.show{ display:flex; }
  .modal-box{ background:var(--bg-panel); border:1px solid var(--line); border-radius:10px; padding:22px; width:340px; }
  .modal-box h3{ font-size:14px; margin:0 0 14px; }
  .modal-box input{ width:100%; background:var(--bg-panel-2); border:1px solid var(--line); border-radius:6px; color:var(--text-1); padding:9px 11px; font-size:13px; margin-bottom:14px; }
  .modal-actions{ display:flex; justify-content:flex-end; gap:8px; }

  .view{ display:none; }
  .view.active{ display:block; }
</style>

<script>
(function(){
  const $ = (sel, el=document) => el.querySelector(sel);
  const $$ = (sel, el=document) => Array.from(el.querySelectorAll(sel));
  const root = document.getElementById("app-root");

  const ZONES = [
    { v:"rear", l:"후면무대" }, { v:"left", l:"측면무대(좌)" }, { v:"right", l:"측면무대(우)" },
    { v:"main", l:"주 무대" }, { v:"audience", l:"객석" },
  ];
  const ZONE_LABEL = Object.fromEntries(ZONES.map(z=>[z.v,z.l]));
  const DEFAULT_CUES = [
    { id:"11", scene:"1막 종료 전환", action:"무대 암전 후 배경 세트 교체", zone:"rear", keywords:["큐","암전"], timeout:30 },
    { id:"12", scene:"2막 1장 전환", action:"무대 좌측 이동식 장치 진입", zone:"left", keywords:["전환","시작"], timeout:30 },
    { id:"13", scene:"주인공 등장", action:"주인공 무대 중앙 이동", zone:"main", keywords:["등장","큐"], timeout:30 },
    { id:"14", scene:"조명 전환", action:"전체 조명 암전 후 스포트라이트 전환", zone:"main", keywords:["조명","전환"], timeout:25 },

  // ===================== Storage helpers (localStorage — works on any host) =====================
  async function safeGet(key){
    try{ return window.localStorage.getItem(key); }
    catch(e){ return null; }
  }
  async function safeSet(key, value){
    try{ window.localStorage.setItem(key, value); return true; }
    catch(e){ return false; }
  }
  async function safeDelete(key){
    try{ window.localStorage.removeItem(key); }catch(e){}
  }

  function slugify(name){
    let s = name.trim().replace(/[\/'"\\]/g,"").replace(/\s+/g,"-");
    if(!s) s = "show";
    return s.slice(0,40) + "-" + Math.random().toString(36).slice(2,7);
  }
  function escapeHtml(str){
    return String(str).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  }
  function setSaveState(state){
    const el = $("#save-indicator");
    el.className = "save-indicator" + (state==="saved" ? " saved" : state==="error" ? " error" : "");
    $("#save-text").textContent = state==="saved" ? "저장됨" : state==="error" ? "저장 실패" : state==="saving" ? "저장 중..." : "대기 중";
  }

  // ===================== Shared state =====================
  let shows = [];
  let currentSlug = null;
  let cues = [];
  let dangerWords = [];
  let saveTimer = null;

  async function init(){
    const rawShows = await safeGet("shows:list");
    if(rawShows){ try{ shows = JSON.parse(rawShows); }catch(e){ shows=[]; } }
    if(!shows.length){
      const slug = slugify("샘플 공연");
      shows = [{ slug, name:"샘플 공연" }];
      await safeSet("shows:list", JSON.stringify(shows));
      await safeSet("cuesheet:"+slug, JSON.stringify(DEFAULT_CUES));
    }
    currentSlug = shows[0].slug;
    await loadCueSheet(currentSlug);

    const rawDanger = await safeGet("dangerwords:list");
    dangerWords = rawDanger ? JSON.parse(rawDanger) : DEFAULT_DANGER_WORDS.slice();
    if(!rawDanger) await safeSet("dangerwords:list", JSON.stringify(dangerWords));

    renderShowSelect();
    renderCueEditor();
    renderRunCueList();
    renderScenarios();
    renderLiveChips();
  }

  async function loadCueSheet(slug){
    const raw = await safeGet("cuesheet:"+slug);
    cues = raw ? (JSON.parse(raw) || []) : [];
  }

  function scheduleSave(){
    setSaveState("saving");
    if(saveTimer) clearTimeout(saveTimer);
    saveTimer = setTimeout(async ()=>{
      const ok = await safeSet("cuesheet:"+currentSlug, JSON.stringify(cues));
      setSaveState(ok ? "saved" : "error");
      setTimeout(()=>{ if($("#save-indicator").classList.contains("saved")) setSaveState("idle"); }, 2000);
    }, 500);
  }
  async function saveDangerWords(){ await safeSet("dangerwords:list", JSON.stringify(dangerWords)); }

  function renderShowSelect(){
    $("#show-select").innerHTML = shows.map(s => `<option value="${s.slug}" ${s.slug===currentSlug?"selected":""}>${escapeHtml(s.name)}</option>`).join("");
  }

  // ===================== Tabs =====================
  $("#tab-manage").addEventListener("click", ()=> switchTab("manage"));
  $("#tab-dashboard").addEventListener("click", ()=> switchTab("dashboard"));
  function switchTab(name){
    $("#tab-manage").classList.toggle("active", name==="manage");
    $("#tab-dashboard").classList.toggle("active", name==="dashboard");
    $("#view-manage").classList.toggle("active", name==="manage");
    $("#view-dashboard").classList.toggle("active", name==="dashboard");
    if(name==="dashboard"){ renderRunCueList(); renderLiveChips(); }
  }

  // ===================== Cue editor (management view) =====================
  function renderCueEditor(){
    const list = $("#cue-list-editor");
    $("#cue-count").textContent = cues.length + "개";
    if(!cues.length){
      list.innerHTML = `<div class="empty-state">등록된 큐가 없습니다. 아래 버튼으로 큐를 추가해 주세요.</div>`;
      return;
    }
    list.innerHTML = cues.map((c,i) => `
      <div class="cue-card" data-idx="${i}">
        <div class="cue-card-grid">
          <div><span class="field-label">번호</span><input class="field-input mono e-id" value="${escapeHtml(c.id)}"></div>
          <div><span class="field-label">장면</span><input class="field-input e-scene" value="${escapeHtml(c.scene)}"></div>
          <div><span class="field-label">동작 설명</span><textarea class="field-textarea e-action">${escapeHtml(c.action)}</textarea></div>
          <div>
            <span class="field-label">구역</span>
            <select class="field-select e-zone">${ZONES.map(z=>`<option value="${z.v}" ${z.v===c.zone?"selected":""}>${z.l}</option>`).join("")}</select>
            <span class="field-label" style="margin-top:6px;">제한시간(초)</span>
            <input class="field-input mono e-timeout" type="number" min="5" max="180" value="${c.timeout||30}">
          </div>
          <div><span class="field-label">큐 신호어</span><div class="kw-input-wrap e-keywords" data-idx="${i}"></div></div>
          <div class="row-actions">
            <button class="icon-btn e-up" title="위로">↑</button>
            <button class="icon-btn e-down" title="아래로">↓</button>
            <button class="icon-btn del e-del" title="삭제">✕</button>
          </div>
        </div>
        <div class="cue-action-row" data-idx="${i}">
          <div class="cue-action-field">
            <span class="field-label">실행 방식</span>
            <select class="field-select e-action-type">
              <option value="none" ${((c.actionType||"none")==="none")?"selected":""}>없음 (표시만)</option>
              <option value="audio" ${c.actionType==="audio"?"selected":""}>오디오 재생</option>
              <option value="midi" ${c.actionType==="midi"?"selected":""}>MIDI 신호 전송</option>
            </select>
          </div>
          <div class="cue-action-field grow e-action-detail"></div>
          <button class="btn" style="padding:8px 12px;font-size:11.5px;" data-testfire="${i}">지금 실행 테스트</button>
          <span class="action-status" id="action-status-${i}">대기</span>
        </div>
      </div>
    `).join("");

    $$(".cue-card", list).forEach(card => {
      const idx = +card.dataset.idx;
      $(".e-id", card).addEventListener("input", e => { cues[idx].id=e.target.value; scheduleSave(); });
      $(".e-scene", card).addEventListener("input", e => { cues[idx].scene=e.target.value; scheduleSave(); });
      $(".e-action", card).addEventListener("input", e => { cues[idx].action=e.target.value; scheduleSave(); });
      $(".e-zone", card).addEventListener("change", e => { cues[idx].zone=e.target.value; scheduleSave(); });
      $(".e-timeout", card).addEventListener("input", e => { cues[idx].timeout=+e.target.value||30; scheduleSave(); });
      renderKeywordEditor($(".e-keywords", card), idx);
      renderActionEditor(card, idx);
      $(".e-action-type", card).addEventListener("change", e => { cues[idx].actionType=e.target.value; scheduleSave(); renderActionEditor(card, idx); });
      $(".e-up", card).addEventListener("click", () => { if(idx>0){ [cues[idx-1],cues[idx]]=[cues[idx],cues[idx-1]]; renderCueEditor(); scheduleSave(); } });
      $(".e-down", card).addEventListener("click", () => { if(idx<cues.length-1){ [cues[idx+1],cues[idx]]=[cues[idx],cues[idx+1]]; renderCueEditor(); scheduleSave(); } });
      $(".e-del", card).addEventListener("click", () => { cues.splice(idx,1); renderCueEditor(); scheduleSave(); });
    });
  }

  function renderKeywordEditor(container, idx){
    const words = cues[idx].keywords || (cues[idx].keywords = []);
    function draw(){
      container.innerHTML = "";
      words.forEach((w,wi) => {
        const chip = document.createElement("span");
        chip.className = "kw-chip";
        chip.innerHTML = `${escapeHtml(w)} <span class="x">✕</span>`;
        chip.querySelector(".x").addEventListener("click", () => { words.splice(wi,1); draw(); scheduleSave(); });
        container.appendChild(chip);
      });
      const input = document.createElement("input");
      input.placeholder = words.length ? "" : "신호어 입력 후 Enter";
      input.addEventListener("keydown", (e) => {
        if(e.key==="Enter" && input.value.trim()){
          e.preventDefault(); words.push(input.value.trim()); input.value=""; draw(); scheduleSave();
        }
      });
      container.appendChild(input);
    }
    draw();
  }

  // ===================== MIDI =====================
  let midiAccess = null;
  let midiOutputs = []; // [{id,name}]

  $("#btn-midi-connect").addEventListener("click", async () => {
    if(!navigator.requestMIDIAccess){
      $("#midi-status").textContent = "MIDI: 미지원 브라우저";
      alert("이 브라우저는 Web MIDI를 지원하지 않습니다. Chrome 또는 Edge를 사용해 주세요.");
      return;
    }
    try{
      midiAccess = await navigator.requestMIDIAccess({ sysex:false });
      refreshMidiOutputs();
      midiAccess.onstatechange = refreshMidiOutputs;
    }catch(err){
      $("#midi-status").textContent = "MIDI: 권한 거부됨";
    }
  });
  function refreshMidiOutputs(){
    midiOutputs = [];
    if(midiAccess){
      midiAccess.outputs.forEach(o => midiOutputs.push({ id:o.id, name:o.name }));
    }
    $("#midi-status").textContent = midiOutputs.length ? `MIDI: 연결됨 (${midiOutputs.length}개 장치)` : "MIDI: 장치 없음";
    renderCueEditor();
  }

  // ===================== In-memory audio attachments (session only) =====================
  const audioBlobs = {}; // key: slug+':'+cueId -> { name, url }
  function audioKey(idx){ return currentSlug + ":" + (cues[idx] ? cues[idx].id : idx); }

  // ===================== Cue action editor (audio / midi config) =====================
  function renderActionEditor(card, idx){
    const c = cues[idx];
    const detail = $(".e-action-detail", card);
    const type = c.actionType || "none";

    if(type === "audio"){
      const key = audioKey(idx);
      const attached = audioBlobs[key];
      const a = c.audio || (c.audio = { fileName:null, volume:100, fadeIn:0, fadeOut:0, loop:false });
      if(a.volume===undefined) a.volume=100;
      detail.innerHTML = `
        <span class="field-label">오디오 파일</span>
        <div style="display:flex; gap:6px; align-items:center; margin-bottom:8px;">
          <input type="file" accept="audio/*" class="e-audio-file" style="font-size:11px; color:var(--text-2); flex:1;">
          <span style="font-size:10.5px; color:${attached?'var(--safe)':'var(--text-3)'};">${attached ? escapeHtml(attached.name) : (a.fileName ? "다시 첨부 필요: "+escapeHtml(a.fileName) : "파일 없음")}</span>
        </div>
        <div style="display:flex; gap:14px; flex-wrap:wrap; align-items:center;">
          <label style="font-size:10.5px; color:var(--text-2); display:flex; align-items:center; gap:6px;">볼륨
            <input type="range" class="e-audio-volume" min="0" max="100" value="${a.volume}" style="width:80px; accent-color:var(--safe);">
            <span class="e-audio-volume-val" style="font-family:var(--font-mono); width:28px;">${a.volume}</span>
          </label>
          <label style="font-size:10.5px; color:var(--text-2); display:flex; align-items:center; gap:6px;">페이드인(초)
            <input type="number" class="field-input mono e-audio-fadein" min="0" max="30" step="0.5" value="${a.fadeIn||0}" style="width:50px;">
          </label>
          <label style="font-size:10.5px; color:var(--text-2); display:flex; align-items:center; gap:6px;">페이드아웃(초)
            <input type="number" class="field-input mono e-audio-fadeout" min="0" max="30" step="0.5" value="${a.fadeOut||0}" style="width:50px;">
          </label>
          <label style="font-size:10.5px; color:var(--text-2); display:flex; align-items:center; gap:6px;">
            <input type="checkbox" class="e-audio-loop" ${a.loop?"checked":""}> 반복재생
          </label>
        </div>
      `;
      $(".e-audio-file", detail).addEventListener("change", (e) => {
        const file = e.target.files[0];
        if(!file) return;
        const url = URL.createObjectURL(file);
        audioBlobs[key] = { name:file.name, url };
        c.audio.fileName = file.name;
        scheduleSave();
        renderActionEditor(card, idx);
      });
      $(".e-audio-volume", detail).addEventListener("input", e => {
        a.volume = +e.target.value;
        $(".e-audio-volume-val", detail).textContent = a.volume;
        scheduleSave();
        liveAdjustVolume(key, a.volume);
      });
      $(".e-audio-fadein", detail).addEventListener("input", e => { a.fadeIn = +e.target.value||0; scheduleSave(); });
      $(".e-audio-fadeout", detail).addEventListener("input", e => { a.fadeOut = +e.target.value||0; scheduleSave(); });
      $(".e-audio-loop", detail).addEventListener("change", e => { a.loop = e.target.checked; scheduleSave(); });
    } else if(type === "midi"){
      const m = c.midi || (c.midi = { deviceId:"", channel:1, msgType:"note", number:60, value:100 });
      const options = midiOutputs.map(o => `<option value="${o.id}" ${o.id===m.deviceId?"selected":""}>${escapeHtml(o.name)}</option>`).join("");
      detail.innerHTML = `
        <div style="display:flex; gap:6px; flex-wrap:wrap;">
          <select class="field-select e-midi-device" style="min-width:120px;">
            <option value="">${midiOutputs.length?"장치 선택":"연결된 장치 없음"}</option>
            ${options}
          </select>
          <select class="field-select e-midi-type" style="width:100px;">
            <option value="note" ${m.msgType==="note"?"selected":""}>Note On</option>
            <option value="cc" ${m.msgType==="cc"?"selected":""}>CC</option>
            <option value="pc" ${m.msgType==="pc"?"selected":""}>Program Change</option>
          </select>
          <input type="number" class="field-input mono e-midi-channel" min="1" max="16" value="${m.channel}" style="width:56px;" title="채널">
          <input type="number" class="field-input mono e-midi-number" min="0" max="127" value="${m.number}" style="width:56px;" title="Note/CC/PC 번호">
          <input type="number" class="field-input mono e-midi-value" min="0" max="127" value="${m.value}" style="width:56px;" title="Velocity/Value" ${m.msgType==="pc"?"disabled":""}>
        </div>
      `;
      $(".e-midi-device", detail).addEventListener("change", e => { m.deviceId=e.target.value; scheduleSave(); });
      $(".e-midi-type", detail).addEventListener("change", e => { m.msgType=e.target.value; scheduleSave(); renderActionEditor(card, idx); });
      $(".e-midi-channel", detail).addEventListener("input", e => { m.channel=Math.max(1,Math.min(16,+e.target.value||1)); scheduleSave(); });
      $(".e-midi-number", detail).addEventListener("input", e => { m.number=Math.max(0,Math.min(127,+e.target.value||0)); scheduleSave(); });
      $(".e-midi-value", detail).addEventListener("input", e => { m.value=Math.max(0,Math.min(127,+e.target.value||0)); scheduleSave(); });
    } else {
      detail.innerHTML = `<span style="font-size:11px;color:var(--text-3);">이 큐는 실행 시 화면 표시만 되고 실제 재생·전송은 하지 않습니다.</span>`;
    }
  }

  // ===================== Audio playback engine (Web Audio API) =====================
  let audioCtx = null;
  function ensureAudioCtx(){
    if(!audioCtx){
      const AC = window.AudioContext || window.webkitAudioContext;
      if(!AC) return null;
      audioCtx = new AC();
    }
    if(audioCtx.state === "suspended") audioCtx.resume();
    return audioCtx;
  }

  const activeAudio = {}; // key -> { audioEl, gainNode, idx, name, fadeOutTimer, uid }
  let audioUidSeq = 1;

  function liveAdjustVolume(key, volume0to100){
    const track = activeAudio[key];
    if(track && track.gainNode){ track.gainNode.gain.value = volume0to100/100; }
  }

  function playCueAudio(idx, statusElId){
    const c = cues[idx];
    const key = audioKey(idx);
    const attached = audioBlobs[key];
    const statusEl = statusElId ? document.getElementById(statusElId) : null;
    function setStatus(text, ok){
      if(statusEl){ statusEl.textContent = text; statusEl.style.color = ok===true?"var(--safe)":ok===false?"var(--alert)":"var(--text-3)"; }
    }
    if(!attached){ setStatus("파일 미첨부", false); pushLog("info", `Cue ${c.id} 오디오 재생 실패 — 파일이 첨부되지 않았습니다.`); return; }
    const ctx = ensureAudioCtx();
    if(!ctx){ setStatus("오디오 미지원", false); pushLog("bad", "이 브라우저는 Web Audio API를 지원하지 않습니다."); return; }

    // retrigger: stop any existing instance of this cue immediately
    if(activeAudio[key]) stopCueAudio(key, true);

    const a = c.audio || {};
    const volume = (a.volume===undefined ? 100 : a.volume) / 100;
    const fadeIn = a.fadeIn || 0;
    const fadeOut = a.fadeOut || 0;

    const audioEl = new Audio(attached.url);
    audioEl.loop = !!a.loop;
    audioEl.crossOrigin = "anonymous";

    let sourceNode, gainNode;
    try{
      sourceNode = ctx.createMediaElementSource(audioEl);
      gainNode = ctx.createGain();
      sourceNode.connect(gainNode).connect(ctx.destination);
    }catch(err){
      setStatus("오디오 연결 실패", false);
      pushLog("bad", `Cue ${c.id} 오디오 엔진 연결 실패: ${err.message}`);
      return;
    }
    gainNode.gain.value = fadeIn>0 ? 0 : volume;

    const uid = audioUidSeq++;
    activeAudio[key] = { audioEl, gainNode, idx, name:attached.name, uid, fadeOutTimer:null, paused:false };

    audioEl.play().then(()=>{
      setStatus("재생 중: "+attached.name, true);
      pushLog("ok", `Cue ${c.id} 오디오 재생 시작 (${attached.name})`);
      if(fadeIn>0){ gainNode.gain.linearRampToValueAtTime(volume, ctx.currentTime + fadeIn); }
      renderActiveAudioPanel();
      startAudioPoll();
    }).catch(err=>{
      setStatus("재생 실패", false);
      pushLog("bad", `Cue ${c.id} 오디오 재생 실패: ${err.message}`);
      delete activeAudio[key];
      renderActiveAudioPanel();
    });

    audioEl.addEventListener("loadedmetadata", () => {
      if(fadeOut>0 && !audioEl.loop && isFinite(audioEl.duration)){
        const t = Math.max(0, (audioEl.duration - fadeOut) * 1000);
        activeAudio[key] && (activeAudio[key].fadeOutTimer = setTimeout(() => {
          if(activeAudio[key] && activeAudio[key].uid===uid) rampGain(gainNode, 0, fadeOut);
        }, t));
      }
    });
    audioEl.addEventListener("ended", () => {
      if(activeAudio[key] && activeAudio[key].uid===uid){
        delete activeAudio[key];
        renderActiveAudioPanel();
      }
    });
  }

  function rampGain(gainNode, target, seconds){
    const ctx = audioCtx; if(!ctx) { gainNode.gain.value = target; return; }
    const now = ctx.currentTime;
    gainNode.gain.cancelScheduledValues(now);
    gainNode.gain.setValueAtTime(gainNode.gain.value, now);
    gainNode.gain.linearRampToValueAtTime(target, now + Math.max(0.02, seconds));
  }

  function stopCueAudio(key, immediate){
    const track = activeAudio[key];
    if(!track) return;
    if(track.fadeOutTimer) clearTimeout(track.fadeOutTimer);
    const c = cues[track.idx];
    const fadeOut = (c && c.audio && c.audio.fadeOut) || 0;
    const doStop = () => { try{ track.audioEl.pause(); }catch(e){} delete activeAudio[key]; renderActiveAudioPanel(); };
    if(!immediate && fadeOut>0){
      rampGain(track.gainNode, 0, fadeOut);
      setTimeout(doStop, fadeOut*1000 + 30);
    } else if(!immediate){
      rampGain(track.gainNode, 0, 0.05);
      setTimeout(doStop, 80);
    } else {
      doStop();
    }
  }

  function togglePauseAudio(key){
    const track = activeAudio[key]; if(!track) return;
    if(track.audioEl.paused){ track.audioEl.play(); track.paused=false; }
    else { track.audioEl.pause(); track.paused=true; }
    renderActiveAudioPanel();
  }

  function stopAllAudio(){
    Object.keys(activeAudio).forEach(key => stopCueAudio(key, true));
    pushLog("info", "모든 오디오를 정지했습니다.");
  }
  $("#btn-stop-audio").addEventListener("click", stopAllAudio);

  function fmtTime(sec){
    if(!isFinite(sec) || sec<0) sec = 0;
    const m = Math.floor(sec/60), s = Math.floor(sec%60);
    return `${m}:${String(s).padStart(2,"0")}`;
  }

  let audioPollHandle = null;
  function startAudioPoll(){
    if(audioPollHandle) return;
    audioPollHandle = setInterval(() => {
      if(!Object.keys(activeAudio).length){ clearInterval(audioPollHandle); audioPollHandle=null; return; }
      updateAudioProgressOnly();
    }, 250);
  }

  function updateAudioProgressOnly(){
    Object.entries(activeAudio).forEach(([key, track]) => {
      const bar = document.querySelector(`.audio-progress[data-key="${cssEscape(key)}"] i`);
      const timeEl = document.querySelector(`.audio-track-time[data-key="${cssEscape(key)}"]`);
      if(bar && track.audioEl.duration){
        const pct = Math.min(100, (track.audioEl.currentTime/track.audioEl.duration)*100);
        bar.style.width = pct+"%";
      }
      if(timeEl){ timeEl.textContent = `${fmtTime(track.audioEl.currentTime)} / ${fmtTime(track.audioEl.duration)}`; }
    });
  }
  function cssEscape(s){ return String(s).replace(/[^a-zA-Z0-9_-]/g, "_"); }

  function renderActiveAudioPanel(){
    const box = $("#active-audio-list");
    if(!box) return;
    const keys = Object.keys(activeAudio);
    $("#audio-active-count").textContent = keys.length + "개";
    if(!keys.length){
      box.innerHTML = `<div class="audio-empty">현재 재생 중인 오디오가 없습니다.</div>`;
      return;
    }
    box.innerHTML = keys.map(key => {
      const t = activeAudio[key];
      const c = cues[t.idx];
      const vol = c && c.audio ? (c.audio.volume===undefined?100:c.audio.volume) : 100;
      return `
        <div class="audio-track">
          <div class="audio-track-top">
            <span class="audio-track-name">${escapeHtml(t.name)}${c?` · Cue ${escapeHtml(c.id)}`:""}</span>
            <span class="audio-track-time" data-key="${cssEscape(key)}">0:00 / 0:00</span>
          </div>
          <div class="audio-progress" data-key="${cssEscape(key)}"><i></i></div>
          <div class="audio-track-controls">
            <button class="audio-mini-btn" data-pause="${escapeHtml(key)}">${t.audioEl.paused?"▶":"❚❚"}</button>
            <button class="audio-mini-btn stop" data-stopone="${escapeHtml(key)}">■</button>
            <input type="range" class="audio-vol-slider" min="0" max="100" value="${vol}" data-volkey="${escapeHtml(key)}">
          </div>
        </div>`;
    }).join("");

    box.querySelectorAll("[data-pause]").forEach(btn => btn.addEventListener("click", () => togglePauseAudio(btn.dataset.pause)));
    box.querySelectorAll("[data-stopone]").forEach(btn => btn.addEventListener("click", () => stopCueAudio(btn.dataset.stopone, false)));
    box.querySelectorAll("[data-volkey]").forEach(sl => sl.addEventListener("input", (e) => {
      const key = e.target.dataset.volkey;
      const track = activeAudio[key];
      if(track){ track.gainNode.gain.value = (+e.target.value)/100; }
      const t = activeAudio[key];
      if(t){ const c = cues[t.idx]; if(c && c.audio){ c.audio.volume = +e.target.value; scheduleSave(); } }
    }));
  }

  // ===================== MIDI execution =====================
  function sendMidi(m){
    if(!midiAccess) return { ok:false, msg:"MIDI 장치가 연결되지 않았습니다. 상단 'MIDI 장치 연결' 버튼을 먼저 눌러주세요." };
    let output = null;
    midiAccess.outputs.forEach(o => { if(o.id === m.deviceId) output = o; });
    if(!output) return { ok:false, msg:"선택된 MIDI 장치를 찾을 수 없습니다." };
    const ch = Math.max(0, Math.min(15, (m.channel||1)-1));
    let bytes;
    if(m.msgType === "note"){ bytes = [0x90 | ch, m.number, m.value]; }
    else if(m.msgType === "cc"){ bytes = [0xB0 | ch, m.number, m.value]; }
    else { bytes = [0xC0 | ch, m.number]; }
    try{ output.send(bytes); return { ok:true, msg:`MIDI 전송 완료 (ch${m.channel} ${m.msgType} ${m.number}${m.msgType!=="pc"?"/"+m.value:""})` }; }
    catch(err){ return { ok:false, msg:"MIDI 전송 실패: "+err.message }; }
  }

  function executeCueAction(idx, statusElId){
    const c = cues[idx]; if(!c) return;
    const type = c.actionType || "none";
    const statusEl = statusElId ? document.getElementById(statusElId) : null;
    function setStatus(text, ok){
      if(statusEl){ statusEl.textContent = text; statusEl.style.color = ok===true?"var(--safe)":ok===false?"var(--alert)":"var(--text-3)"; }
    }
    if(type === "audio"){
      playCueAudio(idx, statusElId);
    } else if(type === "midi"){
      const res = sendMidi(c.midi || {});
      setStatus(res.ok ? "MIDI 전송됨" : "MIDI 전송 실패", res.ok);
      pushLog(res.ok ? "ok" : "bad", `Cue ${c.id} ${res.msg}`);
    } else {
      setStatus("표시만", null);
    }
  }

  root.addEventListener("click", (e) => {
    const btn = e.target.closest("[data-testfire]");
    if(btn){ executeCueAction(+btn.dataset.testfire, "action-status-"+btn.dataset.testfire); }
  });


  // ===================== Show management =====================
  $("#show-select").addEventListener("change", async (e) => {
    currentSlug = e.target.value;
    await loadCueSheet(currentSlug);
    renderCueEditor();
    resetRuntime();
    renderRunCueList();
  });
  $("#btn-new-show").addEventListener("click", () => {
    $("#new-show-name").value = "";
    $("#modal-new-show").classList.add("show");
    $("#new-show-name").focus();
  });
  $("#modal-cancel").addEventListener("click", () => $("#modal-new-show").classList.remove("show"));
  $("#modal-create").addEventListener("click", async () => {
    const name = $("#new-show-name").value.trim();
    if(!name) return;
    const slug = slugify(name);
    shows.push({ slug, name });
    await safeSet("shows:list", JSON.stringify(shows));
    await safeSet("cuesheet:"+slug, JSON.stringify([]));
    currentSlug = slug; cues = [];
    renderShowSelect(); renderCueEditor(); resetRuntime(); renderRunCueList();
    $("#modal-new-show").classList.remove("show");
  });
  $("#btn-del-show").addEventListener("click", async () => {
    if(shows.length<=1){ alert("마지막 남은 큐시트는 삭제할 수 없습니다."); return; }
    const show = shows.find(s=>s.slug===currentSlug);
    if(!confirm(`"${show.name}" 큐시트를 삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.`)) return;
    await safeDelete("cuesheet:"+currentSlug);
    shows = shows.filter(s=>s.slug!==currentSlug);
    await safeSet("shows:list", JSON.stringify(shows));
    currentSlug = shows[0].slug;
    await loadCueSheet(currentSlug);
    renderShowSelect(); renderCueEditor(); resetRuntime(); renderRunCueList();
  });
  $("#btn-add-cue").addEventListener("click", () => {
    const nextNum = cues.length ? (parseInt(cues[cues.length-1].id)||cues.length)+1 : 1;
    cues.push({ id:String(nextNum), scene:"", action:"", zone:"main", keywords:[], timeout:30 });
    renderCueEditor(); scheduleSave();
  });

  // ===================== Export / Import =====================
  $("#btn-export").addEventListener("click", () => {
    const show = shows.find(s=>s.slug===currentSlug);
    const data = { show: show?show.name:"cuesheet", cues, dangerWords };
    const blob = new Blob([JSON.stringify(data,null,2)], { type:"application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = (show?show.name:"cuesheet")+".json";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });
  $("#btn-import").addEventListener("click", () => $("#file-import").click());
  $("#file-import").addEventListener("change", (e) => {
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try{
        const data = JSON.parse(reader.result);
        const imported = Array.isArray(data) ? data : (Array.isArray(data.cues)?data.cues:null);
        if(!imported) throw new Error("invalid");
        if(!confirm(`${imported.length}개의 큐를 현재 큐시트로 가져오시겠습니까? 기존 내용을 덮어씁니다.`)) return;
        cues = imported.map(c => ({ id:String(c.id??""), scene:c.scene||"", action:c.action||"", zone:c.zone||"main", keywords:Array.isArray(c.keywords)?c.keywords:[], timeout:c.timeout||30, actionType:c.actionType||"none", audio:c.audio||null, midi:c.midi||null }));
        if(data.dangerWords && Array.isArray(data.dangerWords)){ dangerWords = data.dangerWords; saveDangerWords(); }
        renderCueEditor(); scheduleSave(); resetRuntime(); renderRunCueList(); renderLiveChips();
      }catch(err){ alert("JSON 파일을 읽는 중 오류가 발생했습니다."); }
      $("#file-import").value = "";
    };
    reader.readAsText(file);
  });

  // ===================== DASHBOARD RUNTIME =====================
  let camStream=null, micStream=null, recognition=null, recognitionActive=false;
  let motionInterval=null, prevGray=null;
  const scoreHistory=[];
  let sensitivity=20;
  const MOTION_BASE=6;
  let cueIdx=0, alertState=null;
  let cueTimerHandle=null, cueRemaining=30;
  const hitScenarios={};

  function nowStr(){ return new Date().toTimeString().slice(0,8); }
  function pushLog(type,msg){
    const log=$("#log"); if(!log) return;
    const row=document.createElement("div");
    row.className="log-row "+type;
    row.innerHTML=`<span class="t">${nowStr()}</span><span class="msg">${msg}</span>`;
    log.prepend(row);
    while(log.children.length>50) log.removeChild(log.lastChild);
  }
  function setBanner(id,type,msg){ const el=$(id); el.className="banner show"+(type?" "+type:""); el.textContent=msg; }
  function clearBanner(id){ $(id).className="banner"; }

  function currentCue(){ return cues[cueIdx] || null; }

  function renderRunCueList(){
    const list = $("#cue-list");
    if(cueIdx >= cues.length) cueIdx = Math.max(0, cues.length-1);
    if(!cues.length){
      list.innerHTML = `<div class="empty-state">큐시트에 큐가 없습니다. "큐시트 관리" 탭에서 먼저 큐를 추가해 주세요.</div>`;
      $("#run-cue-count").textContent = "0/0";
      updateZoneHighlight();
      return;
    }
    list.innerHTML = cues.map((c,i) => {
      const isCurrent = i===cueIdx && !alertState;
      const isAnomaly = alertState && alertState.cueIdx===i;
      const isDone = i<cueIdx;
      let cls="cue"; if(isCurrent) cls+=" current"; if(isAnomaly) cls+=" anomaly"; if(isDone) cls+=" done";
      return `
        <div class="${cls}">
          <div class="cue-top"><span class="cue-num">CUE ${escapeHtml(c.id)}</span><span class="cue-badge">${isAnomaly?"이상 감지":isCurrent?"진행 중":isDone?"완료":"대기"}</span></div>
          <div class="cue-scene">${escapeHtml(c.scene||"(제목 없음)")}</div>
          <div class="cue-action">${escapeHtml(c.action||"")} · ${ZONE_LABEL[c.zone]||c.zone}</div>
          ${isCurrent?'<div class="cue-timeout"><i id="cue-timeout-bar" style="width:100%"></i></div>':""}
        </div>`;
    }).join("");
    $("#run-cue-count").textContent = `${cueIdx}/${cues.length}`;
    updateZoneHighlight();
  }

  function updateZoneHighlight(scanningOverride){
    const c = currentCue();
    $$(".cam-node").forEach(n => {
      n.classList.remove("scanning","alert-zone");
      if(c && n.dataset.z===c.zone){
        if(alertState) n.classList.add("alert-zone");
        else if(scanningOverride) n.classList.add("scanning");
      }
    });
  }

  function renderLiveChips(){
    const c = currentCue();
    const cueBox = $("#cue-chips-live");
    cueBox.innerHTML = c && c.keywords && c.keywords.length
      ? c.keywords.map(w=>`<span class="kw-chip-static cue" data-word="${escapeHtml(w)}">${escapeHtml(w)}</span>`).join("")
      : `<span style="font-size:11px;color:var(--text-3);">현재 큐에 등록된 신호어가 없습니다.</span>`;
    const dgBox = $("#danger-chips-live");
    dgBox.innerHTML = dangerWords.map(w=>`<span class="kw-chip-static danger" data-word="${escapeHtml(w)}">${escapeHtml(w)}</span>`).join("");
  }
  function flashChipLive(word){
    $$(".kw-chip-static").forEach(c=>{ if(c.dataset.word===word){ c.classList.remove("flash"); void c.offsetWidth; c.classList.add("flash"); } });
  }

  function startCueTimer(){
    stopCueTimer();
    const c = currentCue(); if(!c) return;
    cueRemaining = c.timeout || 30;
    cueTimerHandle = setInterval(() => {
      if(alertState) return;
      cueRemaining--;
      const bar = $("#cue-timeout-bar");
      if(bar){ const pct=Math.max(0,(cueRemaining/(c.timeout||30))*100); bar.style.width=pct+"%"; bar.style.background = pct<30?"var(--standby)":"var(--safe)"; }
      if(cueRemaining<=0){ raiseAnomaly("큐 타이머","큐 지연·누락 감지 (제한 시간 초과)"); }
    }, 1000);
  }
  function stopCueTimer(){ if(cueTimerHandle){ clearInterval(cueTimerHandle); cueTimerHandle=null; } }

  function setJudge(state,label,sub){
    const card=$("#judge-card");
    card.className="judge-card"+(state==="anomaly"?" anomaly":state==="normal"?" normal":"");
    $("#judge-result").textContent=label; $("#judge-sub").textContent=sub;
  }
  function setControllers(state){
    ["ctrl-sound","ctrl-light","ctrl-stage"].forEach(id=>{
      const el=$("#"+id);
      el.className="ctrl-state"+(state==="exec"?" exec":state==="stop"?" stop":"");
      el.textContent = state==="exec"?"실행 중":state==="stop"?"정지":"대기";
    });
  }
  function setFlow(stage,anomaly){
    const cls=(n)=> n<=stage ? (anomaly?"flow-node active-alert":"flow-node active") : "flow-node";
    $("#flow-1").className=cls(1); $("#flow-2").className=cls(2); $("#flow-3").className=cls(3);
    const acls=(n)=> n<=stage ? (anomaly?"flow-arrow active-alert":"flow-arrow active") : "flow-arrow";
    $("#arrow-12").className=acls(2); $("#arrow-23").className=acls(3);
  }
  function setStatusPill(alert){
    const pill=$("#status-pill");
    pill.className="status-pill"+(alert?" alert":"");
    $("#status-text").textContent = alert ? "안전 대응 모드" : "정상 가동 중";
  }

  function raiseAnomaly(source,detail){
    if(alertState || !currentCue()) return;
    alertState = { source, detail, cueIdx };
    stopCueTimer();
    setStatusPill(true);
    setJudge("anomaly","안전 이상 감지",`${detail} (${source})`);
    setControllers("stop");
    setFlow(3,true);
    $("#alertbar").className="alertbar show";
    $("#alert-detail").textContent = ` — ${ZONE_LABEL[currentCue().zone]} 구역 · ${detail} (${source})`;
    pushLog("bad", `[${source}] ${detail} → 기기 작동 중지`);
    if(!hitScenarios[detail]) hitScenarios[detail]=nowStr();
    renderScenarios(); renderRunCueList();
  }
  function acknowledgeAlert(){
    if(!alertState) return;
    pushLog("info","안전 이상 확인 완료 → 관제 재개");
    alertState = null;
    setStatusPill(false);
    $("#alertbar").className="alertbar";
    setJudge("idle","모니터링 중","다음 신호를 기다리는 중입니다.");
    setControllers("idle"); setFlow(0,false);
    cueIdx = Math.min(cueIdx+1, cues.length-1);
    renderRunCueList(); renderLiveChips();
    if(recognitionActive) startCueTimer();
  }
  $("#btn-ack").addEventListener("click", acknowledgeAlert);

  function advanceCueNormal(keyword){
    if(alertState || !currentCue()) return;
    const idx = cueIdx;
    setJudge("normal","정상 진행",`큐 신호어 "${keyword}" 인식 → 큐 실행`);
    setControllers("exec"); setFlow(3,false);
    pushLog("ok", `Cue ${currentCue().id} 정상 진행 판단 (신호어 "${keyword}") → 큐 실행`);
    executeCueAction(idx, "live-action-status");
    setTimeout(() => {
      cueIdx = Math.min(cueIdx+1, cues.length-1);
      renderRunCueList(); renderLiveChips();
      setJudge("idle","모니터링 중","다음 신호를 기다리는 중입니다.");
      setControllers("idle"); setFlow(0,false);
      if(recognitionActive) startCueTimer();
    }, 900);
  }

  function manualGo(){
    if(alertState || !currentCue()) return;
    advanceCueNormal("수동 GO");
  }

  function renderScenarios(){
    const box = $("#scn-list"); box.innerHTML = "";
    SCENARIOS.forEach(s => {
      const row = document.createElement("div");
      row.className = "scn-row";
      row.innerHTML = `
        <div class="scn-name">${s.name}<span class="scn-src">${s.src}</span></div>
        <span class="scn-tag${hitScenarios[s.name]?' hit':''}">${hitScenarios[s.name]?('감지 '+hitScenarios[s.name]):'정상'}</span>
        ${!s.real?'<button class="scn-test-btn" data-name="'+s.name+'">테스트</button>':''}
      `;
      box.appendChild(row);
    });
    $$(".scn-test-btn").forEach(btn => btn.addEventListener("click", (e) => raiseAnomaly("수동 테스트", e.target.dataset.name)));
  }

  function resetRuntime(){
    cueIdx=0; alertState=null;
    Object.keys(hitScenarios).forEach(k=>delete hitScenarios[k]);
    $("#alertbar").className="alertbar";
    setStatusPill(false);
    setJudge("idle","대기","카메라·마이크를 시작하면 판단이 시작됩니다.");
    setControllers("idle"); setFlow(0,false);
    renderScenarios(); renderLiveChips();
    const liveStatus = $("#live-action-status");
    if(liveStatus){ liveStatus.textContent="대기"; liveStatus.style.color="var(--text-3)"; }
    stopCueTimer();
  }
  $("#btn-go").addEventListener("click", manualGo);
  $("#btn-run-reset").addEventListener("click", () => {
    resetRuntime(); renderRunCueList();
    $("#log").innerHTML=""; pushLog("info","진행 상태가 초기화되었습니다.");
    if(recognitionActive) startCueTimer();
  });

  // ---- Motion ----
  $("#sensitivity").addEventListener("input", (e) => { sensitivity=+e.target.value; $("#sens-val").textContent=sensitivity; });
  $("#btn-cam").addEventListener("click", async () => {
    clearBanner("#banner-cam");
    try{
      camStream = await navigator.mediaDevices.getUserMedia({ video:{ width:320, height:240 } });
      const video = $("#video");
      video.srcObject = camStream;
      await video.play();
      $("#video-thumb").classList.add("live");
      $("#btn-cam").disabled = true; $("#btn-stop").disabled = false;
      $("#motion-badge").textContent="모션: 감시 중"; $("#motion-badge").classList.add("on");
      pushLog("info","카메라 스트림이 시작되었습니다.");
      startMotionLoop(video);
    }catch(err){
      let msg="카메라를 시작할 수 없습니다.";
      if(err && err.name==="NotAllowedError") msg="카메라 권한이 거부되었습니다.";
      else if(err && err.name==="NotFoundError") msg="사용 가능한 카메라를 찾을 수 없습니다.";
      setBanner("#banner-cam","err",msg);
    }
  });
  function startMotionLoop(video){
    const canvas=document.createElement("canvas"); canvas.width=64; canvas.height=48;
    const ctx=canvas.getContext("2d",{willReadFrequently:true});
    motionInterval=setInterval(() => {
      if(video.readyState<2) return;
      ctx.drawImage(video,0,0,canvas.width,canvas.height);
      const frame=ctx.getImageData(0,0,canvas.width,canvas.height).data;
      const gray=new Uint8ClampedArray(canvas.width*canvas.height);
      for(let i=0,j=0;i<frame.length;i+=4,j++){ gray[j]=(frame[i]*0.299+frame[i+1]*0.587+frame[i+2]*0.114); }
      let score=0;
      if(prevGray){ let sum=0; for(let k=0;k<gray.length;k++){ sum+=Math.abs(gray[k]-prevGray[k]); } score=sum/gray.length; }
      prevGray=gray;
      const norm=Math.min(100, Math.round((score/40)*100));
      scoreHistory.push(norm); if(scoreHistory.length>110) scoreHistory.shift();
      drawSpark();
      $("#meter-fill").style.width=norm+"%"; $("#meter-val").textContent=norm;
      const vt=$("#video-thumb"); vt.classList.remove("motion","spike");
      updateZoneHighlight(true);
      if(norm>=sensitivity){
        vt.classList.add("spike");
        $("#motion-badge").textContent="모션: 이상 감지"; $("#motion-badge").className="badge spike";
        raiseAnomaly("모션 인식","낙상·충돌 등 비정상 동작");
      } else if(norm>=MOTION_BASE){
        vt.classList.add("motion");
        $("#motion-badge").textContent="모션: 동작 감지"; $("#motion-badge").className="badge on";
      } else {
        $("#motion-badge").textContent="모션: 감시 중"; $("#motion-badge").className="badge on";
      }
    }, 180);
  }
  function drawSpark(){
    const c=$("#spark"); const ctx=c.getContext("2d");
    ctx.clearRect(0,0,c.width,c.height); ctx.beginPath();
    const step=c.width/110;
    scoreHistory.forEach((v,i) => { const x=i*step, y=c.height-(v/100)*c.height; if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); });
    ctx.strokeStyle="#34D8B0"; ctx.lineWidth=1.5; ctx.stroke();
    const ty=c.height-(sensitivity/100)*c.height;
    ctx.beginPath(); ctx.moveTo(0,ty); ctx.lineTo(c.width,ty);
    ctx.strokeStyle="rgba(255,77,94,0.5)"; ctx.setLineDash([4,3]); ctx.stroke(); ctx.setLineDash([]);
  }

  // ---- Voice ----
  $("#btn-mic").addEventListener("click", async () => {
    clearBanner("#banner-mic");
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(!SR){ setBanner("#banner-mic","warn","이 브라우저는 음성 인식을 지원하지 않습니다. Chrome 또는 Edge를 사용해 주세요."); return; }
    if(!cues.length){ setBanner("#banner-mic","warn","먼저 큐시트 관리 탭에서 큐를 추가해 주세요."); return; }
    try{ micStream = await navigator.mediaDevices.getUserMedia({ audio:true }); }
    catch(err){ setBanner("#banner-mic","err","마이크 권한이 거부되었거나 마이크를 찾을 수 없습니다."); return; }

    recognition = new SR();
    recognition.lang="ko-KR"; recognition.continuous=true; recognition.interimResults=true;
    recognition.onresult = (event) => {
      let interim="", final="";
      for(let i=event.resultIndex;i<event.results.length;i++){
        const t=event.results[i][0].transcript;
        if(event.results[i].isFinal) final+=t; else interim+=t;
      }
      const box=$("#transcript");
      if(final){
        const div=document.createElement("div"); div.textContent=final; box.appendChild(div);
        box.scrollTop=box.scrollHeight;
        checkKeywords(final);
      }
      let interimEl=$("#interim-line");
      if(!interimEl){ interimEl=document.createElement("div"); interimEl.id="interim-line"; interimEl.className="interim"; box.appendChild(interimEl); }
      interimEl.textContent=interim;
      box.scrollTop=box.scrollHeight;
    };
    recognition.onerror = (e) => pushLog("info", `음성 인식 오류: ${e.error}`);
    recognition.onend = () => { if(recognitionActive){ try{ recognition.start(); }catch(e){} } };
    recognitionActive = true;
    recognition.start();
    $("#mic-badge").textContent="인식 중"; $("#mic-badge").className="badge on";
    $("#btn-mic").disabled=true; $("#btn-stop").disabled=false;
    pushLog("info","음성 인식이 시작되었습니다.");
    $("#transcript").innerHTML="";
    setJudge("idle","모니터링 중","다음 신호를 기다리는 중입니다.");
    setFlow(1,false);
    startCueTimer();
  });

  function checkKeywords(text){
    const c = currentCue(); if(!c) return;
    const hitDanger = dangerWords.find(w => text.includes(w));
    const hitCue = (c.keywords||[]).find(w => text.includes(w));
    setFlow(2,false);
    if(hitDanger){ flashChipLive(hitDanger); raiseAnomaly("음성 인식", `위험 신호어 "${hitDanger}" 인식`); }
    else if(hitCue){ flashChipLive(hitCue); advanceCueNormal(hitCue); }
  }

  // ---- Stop all ----
  $("#btn-stop").addEventListener("click", () => {
    if(motionInterval){ clearInterval(motionInterval); motionInterval=null; }
    if(camStream){ camStream.getTracks().forEach(t=>t.stop()); camStream=null; }
    if(recognition){ recognitionActive=false; try{ recognition.stop(); }catch(e){} recognition=null; }
    if(micStream){ micStream.getTracks().forEach(t=>t.stop()); micStream=null; }
    stopCueTimer();
    stopAllAudio();
    $("#video-thumb").classList.remove("live","motion","spike");
    $("#btn-cam").disabled=false; $("#btn-mic").disabled=false; $("#btn-stop").disabled=true;
    $("#motion-badge").textContent="모션: 대기"; $("#motion-badge").className="badge";
    $("#mic-badge").textContent="대기"; $("#mic-badge").className="badge";
    setJudge("idle","대기","카메라·마이크를 시작하면 판단이 시작됩니다.");
    setControllers("idle"); setFlow(0,false);
    prevGray=null; scoreHistory.length=0;
    pushLog("info","모든 인식이 중지되었습니다.");
  });

  init();
})();
</script>
